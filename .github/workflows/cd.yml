name: Continuous Deployment

on:
  push:
    branches: ["main"]
    tags:
      - "v*.*.*"   # triggers only when you push semantic tag

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Extract Version
        id: vars
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Login Docker
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # Backend
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/query-tracker-server:${{ steps.vars.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/query-tracker-server:latest

      # Frontend
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/query-tracker-client:${{ steps.vars.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/query-tracker-client:latest